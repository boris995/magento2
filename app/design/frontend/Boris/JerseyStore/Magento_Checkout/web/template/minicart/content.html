<div class="flex h-full flex-col bg-white text-[#050505]">
    <div class="flex min-h-[76px] items-center justify-between border-b border-gray-200 px-5 sm:px-6">
        <div>
            <p class="text-[11px] font-black uppercase tracking-[0.24em] text-[#ff2b2b]" translate="'Jersey Store'"></p>
            <h2 class="mt-1 text-xl font-black uppercase tracking-[0.08em]" translate="'Your Cart'"></h2>
        </div>

        <button type="button"
                id="btn-minicart-close"
                class="action close grid h-11 w-11 place-items-center border border-gray-200 text-[#050505] transition hover:border-[#ff2b2b] hover:text-[#ff2b2b]"
                data-action="close"
                data-bind="attr: { title: $t('Close') }, click: closeMinicart()">
            <svg class="h-5 w-5" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <path d="M6 6l12 12M18 6 6 18" stroke="currentColor" stroke-width="2" stroke-linecap="round"></path>
            </svg>
            <span class="sr-only" translate="'Close'"></span>
        </button>
    </div>

    <if args="getCartParam('summary_count')">
        <div class="flex items-center justify-between border-b border-gray-100 px-5 py-4 text-xs font-extrabold uppercase tracking-[0.12em] text-gray-500 sm:px-6">
            <div class="items-total">
                <span class="count" if="maxItemsToDisplay < getCartLineItemsCount()" text="maxItemsToDisplay"></span>
                <translate args="'of'" if="maxItemsToDisplay < getCartLineItemsCount()"></translate>
                <span class="count" text="getCartParam('summary_count').toLocaleString(window.LOCALE)"></span>
                <!-- ko if: (getCartParam('summary_count') > 1) -->
                    <span translate="'Items in Cart'"></span>
                <!--/ko-->
                <!-- ko if: (getCartParam('summary_count') <= 1) -->
                    <span translate="'Item in Cart'"></span>
                <!--/ko-->
            </div>
            <a class="action viewcart !text-[#050505] !no-underline transition hover:!text-[#ff2b2b]" data-bind="attr: {href: shoppingCartUrl}">
                <span translate="'View Cart'"></span>
            </a>
        </div>

        <div data-action="scroll" class="minicart-items-wrapper flex-1 overflow-y-auto px-5 py-5 sm:px-6">
            <ol id="mini-cart" class="minicart-items grid gap-4" data-bind="foreach: { data: getCartItems(), as: 'item' }">
                <each args="$parent.getRegion($parent.getItemRenderer(item.product_type))"
                      render="{name: getTemplate(), data: item, afterRender: function() {$parents[1].initSidebar()}}"></each>
            </ol>
        </div>

        <div class="border-t border-gray-200 bg-white px-5 py-5 shadow-[0_-12px_35px_rgba(5,5,5,0.07)] sm:px-6">
            <each args="getRegion('subtotalContainer')" render=""></each>
            <each args="getRegion('extraInfo')" render=""></each>

            <div class="actions mt-5" if="getCartParam('possible_onepage_checkout')">
                <div class="primary">
                    <button
                            id="top-cart-btn-checkout"
                            type="button"
                            class="action primary checkout h-12 w-full bg-[#ff2b2b] px-5 text-sm font-black uppercase tracking-[0.12em] text-white transition hover:bg-[#d71919]"
                            data-action="close"
                            data-bind="attr: { title: $t('Proceed to Checkout') }, click: closeMinicart()"
                            translate="'Proceed to Checkout'">
                    </button>
                    <div data-bind="html: getCartParamUnsanitizedHtml('extra_actions')"></div>
                </div>
            </div>

            <div class="actions mt-3">
                <div class="secondary">
                    <a class="action viewcart flex h-12 w-full items-center justify-center border border-[#050505] px-5 text-sm font-black uppercase tracking-[0.12em] !text-[#050505] !no-underline transition hover:border-[#ff2b2b] hover:!text-[#ff2b2b]"
                       data-bind="attr: {href: shoppingCartUrl}">
                        <span translate="'View and Edit Cart'"></span>
                    </a>
                </div>
            </div>
        </div>
    </if>

    <ifnot args="getCartParam('summary_count')">
        <div class="flex flex-1 flex-col items-center justify-center px-6 text-center">
            <div class="grid h-16 w-16 place-items-center rounded-full bg-gray-100 text-[#ff2b2b]">
                <svg class="h-8 w-8" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                    <path d="M6.5 8h11l-1 12h-9l-1-12Zm3 0a2.5 2.5 0 0 1 5 0" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"></path>
                </svg>
            </div>
            <strong class="subtitle empty mt-5 text-xl font-black uppercase tracking-[0.08em]" translate="'You have no items in your shopping cart.'"></strong>
            <p class="mt-3 max-w-[280px] text-sm font-semibold leading-6 text-gray-500" translate="'Add your favorite jersey and it will appear here instantly.'"></p>
            <a class="mt-7 inline-flex h-12 items-center justify-center bg-[#050505] px-6 text-sm font-black uppercase tracking-[0.12em] !text-white !no-underline transition hover:bg-[#ff2b2b]"
               data-bind="attr: {href: shoppingCartUrl}">
                <span translate="'View Cart'"></span>
            </a>
        </div>
    </ifnot>

    <div id="minicart-widgets" class="minicart-widgets" if="regionHasElements('promotion')">
        <each args="getRegion('promotion')" render=""></each>
    </div>
</div>
<each args="getRegion('sign-in-popup')" render=""></each>
